version: 2
project_name: xfpl
changelog:
  disable: true
builds:
  - id: xfpl
    main: ./cmd/xfpl
    binary: xfpl
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/ananthmenon10/xfpl/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: xfpl-mcp
    main: ./cmd/xfpl-mcp
    binary: xfpl-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: xfpl
    repository:
      owner: ananthmenon10
      name: homebrew-xfpl
    homepage: "https://github.com/ananthmenon10/xfpl"
    description: "The only FPL CLI that knows what's actually about to happen — live ranks, EO, price changes, captain ranker, chip planner."
    license: "Apache-2.0"
    install: |
      bin.install "xfpl"
      bin.install "xfpl-mcp"
    test: |
      system "#{bin}/xfpl", "--version"
