name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Verify formatting
        run: |
          gofmt -l . | tee /tmp/gofmt-out
          test ! -s /tmp/gofmt-out

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test -race -count=1 ./...

      - name: Build binaries
        run: |
          go build -o xfpl ./cmd/xfpl
          go build -o xfpl-mcp ./cmd/xfpl-mcp
          ./xfpl --version
          test -x ./xfpl-mcp
